<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Capito cache reset</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#111827;color:#f8fafc;margin:0;min-height:100vh;display:grid;place-items:center}
    main{width:min(560px,calc(100vw - 32px));background:#172033;border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.35)}
    button,a{display:inline-flex;margin-top:16px;border:0;border-radius:14px;padding:12px 16px;background:#7ddc98;color:#08120c;font-weight:800;text-decoration:none;cursor:pointer}
    p{color:#b8c2d6;line-height:1.55}
    code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:8px}
  </style>
</head>
<body>
  <main>
    <h1>Capito cache reset</h1>
    <p>This page unregisters old service workers and clears browser caches for this app. Use it if a desktop browser keeps showing an old login screen.</p>
    <button id="reset">Reset local app cache</button>
    <p id="status"></p>
    <a href="./index.html">Open Capito</a>
  </main>
  <script>
    async function resetCache(){
      const status = document.getElementById('status');
      status.textContent = 'Clearing...';
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(reg => reg.unregister()));
      }
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(key => caches.delete(key)));
      }
      status.textContent = 'Done. Open Capito again.';
    }
    document.getElementById('reset').addEventListener('click', resetCache);
  </script>
</body>
</html>
